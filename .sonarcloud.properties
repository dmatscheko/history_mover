# SonarCloud Automatic Analysis configuration.
#
# Automatic Analysis reads exactly this file (.sonarcloud.properties in the
# repository root). Only custom_components/ is shipped to users; tests/ is the
# test suite.
#
# Automatic Analysis cannot ignore individual rules from this file. If these
# come up, they are deliberate and need an "Accept" in the SonarCloud UI:
# - githubactions:S7637 (pin actions to a SHA): hassfest and the HACS
#   validator are living validators without releases, documented to be used
#   from master/main; a pinned SHA would freeze Home Assistant's validation
#   rules and silently rot (see the comments in the workflows).
# - python:S7503 (async function without await): Home Assistant's entry
#   points (async_setup, async_setup_entry, ...) must be coroutines per the HA
#   API even when a particular body needs no await.
sonar.sources=custom_components
sonar.tests=tests
